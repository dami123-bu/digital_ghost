services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/app/data/chroma
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - NCBI_API_KEY=${NCBI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
